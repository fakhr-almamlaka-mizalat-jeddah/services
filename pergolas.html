<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>برجولات جدة - مؤسسة فخر المملكة</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .item { border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 10px; }
        .item img { width: 100%; border-radius: 8px; }
        .maint { background: #003366; color: white; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div style="text-align:center; padding:10px;"><a href="index.html">العودة للرئيسية</a></div>
    <main>
        <h1 style="text-align:center;">برجولات حدائق وجلسات خارجية بجدة</h1>
        <div class="grid">
            <div class="item">
                <img src="https://github.com/fakhr-almamlaka-mizalat-jeddah/services/blob/main/images/pergolas/pergola-wood-fakhr-almamlaka-jeddah1.webp?raw=true" alt="برجولات خشبية جدة فخر المملكة">
                <p>برجولات خشبية وحديدية توفر أجمل الجلسات الخارجية بتصاميم عصرية ومقاومة للعوامل الجوية.</p>
            </div>
            <!-- كرر هذا القسم لكل صور البرجولات -->
        </div>
        <section class="maint">
            <h2>خدمات الصيانة والترميم</h2>
            <p>نعمل على صيانة وإعادة تجديد البرجولات القديمة لتبدو كأنها جديدة بأعلى جودة في جدة.</p>
        </section>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة فخر المملكة للمظلات والسواتر بجدة</title>
    <meta name="description" content="مؤسسة فخر المملكة لتركيب وتصميم المظلات والسواتر بجدة.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { dark: '#0b0f19', surface: '#161d30', gold: '#f59e0b', goldHover: '#d97706' } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background-color: #0b0f19; } .gallery-scroll::-webkit-scrollbar { height: 8px; } .gallery-scroll::-webkit-scrollbar-track { background: #161d30; } .gallery-scroll::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }</style>
</head>
<body class="text-gray-200 antialiased">

    <!-- Header -->
    <header class="border-b border-gray-800/80 bg-brand-dark/90 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-gold to-amber-400 flex items-center justify-center font-black text-black">ف</div>
                <div class="flex flex-col"><span class="text-xl font-black text-white leading-none">فخر المملكة</span><span class="text-[10px] text-brand-gold font-bold">للمظلات والسواتر</span></div>
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#hero" class="hover:text-brand-gold">الرئيسية</a>
                <a href="#services" class="hover:text-brand-gold">خدماتنا</a>
                <a href="#gallery" class="hover:text-brand-gold">معرض الأعمال</a>
                <a href="#comments" class="hover:text-brand-gold">آراء العملاء</a>
            </nav>
            <button onclick="toggleAdminModal()" class="text-xs border border-gray-700 bg-brand-surface/50 px-3 py-1.5 rounded-lg text-gray-400">لوحة المشرف</button>
        </div>
    </header>

    <!-- Content Sections -->
    <section id="hero" class="min-h-[70vh] flex items-center justify-center text-center p-4">
        <div class="max-w-3xl">
            <h1 class="text-5xl font-black text-white">نبتكر الفخامة والظلال الدائمة</h1>
            <p class="mt-6 text-gray-400">متخصصون في المظلات، السواتر، والبرجولات بجدة بمعايير جودة عالية.</p>
        </div>
    </section>

    <section id="ads" class="py-10">
        <div class="max-w-4xl mx-auto px-4 bg-brand-surface/40 border border-brand-gold/30 rounded-2xl p-8">
            <h2 id="ad-title" class="text-2xl font-black text-white">خصم 15% على تركيب مظلات السيارات!</h2>
            <p id="ad-desc" class="text-gray-400 mt-2">يسري العرض في كافة أحياء جدة.</p>
            <img id="ad-img" src="https://images.unsplash.com/photo-1513694203232-719a280e022f" class="hidden">
        </div>
    </section>

    <section id="comments" class="py-20 max-w-2xl mx-auto px-4">
        <h2 class="text-2xl font-black text-white text-center mb-8">آراء العملاء</h2>
        <div class="bg-brand-surface p-6 rounded-2xl mb-8">
            <input id="comment-user" placeholder="اسمك الكريم" class="w-full bg-brand-dark p-3 rounded-xl mb-3 border border-gray-700">
            <textarea id="comment-text" placeholder="تعليقك..." class="w-full bg-brand-dark p-3 rounded-xl mb-3 border border-gray-700"></textarea>
            <button onclick="addComment()" class="w-full bg-brand-gold text-black font-bold py-3 rounded-xl">نشر التعليق</button>
        </div>
        <div id="comments-list" class="space-y-4"></div>
    </section>

    <!-- Admin Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden">
        <div class="bg-brand-surface w-full max-w-lg p-6 rounded-2xl">
            <h3 class="text-brand-gold font-bold mb-4">لوحة تحكم المشرف</h3>
            <input id="admin-ad-title" placeholder="عنوان العرض" class="w-full bg-brand-dark p-2 mb-2 rounded border border-gray-700">
            <textarea id="admin-ad-desc" placeholder="وصف العرض" class="w-full bg-brand-dark p-2 mb-2 rounded border border-gray-700"></textarea>
            <button onclick="updateAdFromAdmin()" class="w-full bg-brand-gold py-2 rounded">تحديث العرض</button>
            <button onclick="toggleAdminModal()" class="mt-4 text-gray-400 text-sm">إغلاق</button>
        </div>
    </div>

    <script>
        // --- JavaScript المنطقي ---
        let commentsData = JSON.parse(localStorage.getItem('comments')) || [
            { id: 1, name: "خالد", rating: "⭐⭐⭐⭐⭐", text: "شغل احترافي!" }
        ];

        function renderComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = '';
            commentsData.forEach(c => {
                list.innerHTML += `<div class="bg-brand-surface p-4 rounded-xl flex justify-between">
                    <div><p class="font-bold">${c.name}</p><p class="text-sm">${c.text}</p></div>
                    <button onclick="deleteComment(${c.id})" class="text-red-500">حذف</button>
                </div>`;
            });
        }

        function addComment() {
            const name = document.getElementById('comment-user').value;
            const text = document.getElementById('comment-text').value;
            if(name && text) {
                commentsData.unshift({ id: Date.now(), name, text });
                localStorage.setItem('comments', JSON.stringify(commentsData));
                renderComments();
            }
        }

        function deleteComment(id) {
            commentsData = commentsData.filter(c => c.id !== id);
            localStorage.setItem('comments', JSON.stringify(commentsData));
            renderComments();
        }

        function updateAdFromAdmin() {
            const t = document.getElementById('admin-ad-title').value;
            const d = document.getElementById('admin-ad-desc').value;
            document.getElementById('ad-title').innerText = t;
            document.getElementById('ad-desc').innerText = d;
            localStorage.setItem('ad', JSON.stringify({t, d}));
            toggleAdminModal();
        }

        function toggleAdminModal() { document.getElementById('admin-modal').classList.toggle('hidden'); }

        window.onload = () => {
            const savedAd = JSON.parse(localStorage.getItem('ad'));
            if(savedAd) {
                document.getElementById('ad-title').innerText = savedAd.t;
                document.getElementById('ad-desc').innerText = savedAd.d;
            }
            renderComments();
        };
    </script>
</body>
</html>

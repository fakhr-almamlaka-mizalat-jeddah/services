<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="فخر المملكة للمظلات والسواتر بجدة. متخصصون في تركيب المظلات، السواتر، البرجولات، وهناجر المستودعات بأعلى جودة وضمان.">
    <meta name="keywords" content="مظلات جدة, سواتر جدة, برجولات جدة, تركيب هناجر, فخر المملكة">
    <title>فخر المملكة | مظلات وسواتر جدة</title>

    <!-- Schema Markup للظهور الاحترافي في جوجل -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "فخر المملكة للمظلات والسواتر",
      "address": { "@type": "PostalAddress", "addressLocality": "جدة", "addressCountry": "SA" },
      "url": "https://fakhr-almamlaka-mizalat-jeddah.github.io/services/"
    }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        .header { background: #333; color: white; padding: 20px; text-align: center; }
        .filters { text-align: center; padding: 20px; }
        .filters button { padding: 10px 20px; margin: 5px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: white; transition: 0.3s; }
        .filters button:hover { background: #ff9800; color: white; border-color: #ff9800; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s; }
        .gallery-item img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="header">
        <h1>معرض أعمال فخر المملكة للمظلات والسواتر</h1>
    </div>

    <div class="filters">
        <button onclick="filterGallery('all')">الكل</button>
        <button onclick="filterGallery('mizalat')">المظلات</button>
        <button onclick="filterGallery('pergola')">البرجولات</button>
        <button onclick="filterGallery('sawater')">السواتر</button>
        <button onclick="filterGallery('others')">هناجر ومباني</button>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        let allImages = [];

        fetch('images.json')
            .then(response => response.json())
            .then(data => {
                allImages = data;
                renderGallery(allImages);
            });

        function renderGallery(images) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            images.forEach(img => {
                container.innerHTML += `
                    <div class="gallery-item">
                        <img src="${img.src}" alt="${img.alt}" loading="lazy">
                    </div>
                `;
            });
        }

        function filterGallery(cat) {
            if (cat === 'all') renderGallery(allImages);
            else renderGallery(allImages.filter(i => i.category === cat));
        }
    </script>
</body>
</html>

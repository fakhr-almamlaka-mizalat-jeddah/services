        :root {
            --primary-color: #d4af37;
            --secondary-color: #1a1a1a;
            --light-bg: #f9f9f9;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--secondary-color);
            color: var(--white);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: #ccc;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background-color: var(--white);
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--secondary-color);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-info {
            padding: 15px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .gallery-item-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        /* Lightbox (نافذة العرض الكبيرة) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            border: 3px solid var(--primary-color);
            border-radius: 5px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: var(--white);
            font-size: 40px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>

        function renderGallery(filteredImages) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = ''; // تفريغ المعرض أولاً

            filteredImages.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="images/${img.src}" alt="${img.title}" onclick="openLightbox('images/${img.src}')" loading="lazy">
                    <div class="gallery-item-info">
                        <div class="gallery-item-title">${img.title}</div>
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        // دالة فلترة الصور حسب التصنيف
        function filterGallery(category) {
            // تحديث تصميم الأزرار النشطة
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                renderGallery(images);
            } else {
                const filtered = images.filter(img => img.category === category);
                renderGallery(filtered);
            }
        }

        // دوال التحكم بالنافذة المنبثقة لتكبير الصور (Lightbox)
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        // تشغيل المعرض تلقائياً عند تحميل الصفحة لأول مرة وعرض كافة الصور
        window.onload = function() {
            renderGallery(images);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة فخر المملكة للمظلات والسواتر بجدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .gallery-container { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; scrollbar-width: thin; }
        .gallery-img { min-width: 250px; height: 180px; object-fit: cover; border-radius: 12px; transition: transform 0.3s; }
        .gallery-img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <section class="py-16 px-6 bg-white">
        <h2 class="text-3xl font-bold text-center mb-10 text-gray-800">معرض مشاريعنا (المسار الأول)</h2>
        <div id="gallery-row-1" class="gallery-container"></div>

        <h2 class="text-3xl font-bold text-center mt-20 mb-10 text-gray-800">معرض مشاريعنا (المسار الثاني)</h2>
        <div id="gallery-row-2" class="gallery-container"></div>
    </section>

    <script>
        // هنا تضع أسماء ملفات صورك - المسار الأول (45 صورة)
        const imagesRow1 = [
            "ads-fakhr-almamlaka-sawater-mizalat-white-fakhr-almamlaka-jeddah2.webp",
            "mizalat-galsat-pvc-mamar-fakhr-almamlaka-jeddah107.webp",
            // ... أضف هنا باقي الـ 45 اسم صورة
        ];

        // هنا تضع أسماء ملفات صورك - المسار الثاني (45 صورة)
        const imagesRow2 = [
            "hangars-industrial-warehouse-fakhr-almamlaka-jeddah11.webp",
            "mizalat-hadaiq-pvc-makhrouti-fakhr-almamlaka-jeddah110.webp",
            // ... أضف هنا باقي الـ 45 اسم صورة
        ];

        // دالة عرض الصور
        function renderGallery(images, containerId) {
            const container = document.getElementById(containerId);
            images.forEach(imgName => {
                container.innerHTML += `<img src="images/${imgName}" alt="مشروع فخر المملكة" class="gallery-img shadow-lg" onerror="this.src='https://via.placeholder.com/250'">`;
            });
        }

        renderGallery(imagesRow1, 'gallery-row-1');
        renderGallery(imagesRow2, 'gallery-row-2');
    </script>

    </body>
</html>
